# .github/workflows/ci-cd-pipeline.yml
name: CI/CD Pipeline

# Trigger workflow manually or on push to main branch
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # --------------------------------------
  # Job 1: Unit Tests
  # --------------------------------------
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      # Force Actions to run Node.js 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: mvn -B test
        working-directory: data

  # --------------------------------------
  # Job 2: SonarQube Analysis
  # --------------------------------------
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: tests
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=houssamb6_CI-CD-pipeline
        working-directory: data

  # --------------------------------------
  # Job 3: Build & Upload Artifact
  # --------------------------------------
  build:
    name: Build and Upload Artifact
    runs-on: ubuntu-latest
    needs: sonar
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests
        working-directory: data

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v3
        with:
          name: data-jar
          path: data/target/data-0.0.1-SNAPSHOT.jar