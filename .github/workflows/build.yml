name: CI/CD Pipeline

# Trigger on push to main branch or manually
on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Unit tests job
  tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v4

      # Step 2: Set up Java 22
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      # Step 3: Run Maven tests
      - name: Run Tests
        run: mvn -B test
        working-directory: data

  # SonarQube analysis job
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: tests
    steps:
      # Checkout repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for full SonarQube analysis

      # Set up Java 22 for Sonar
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      # Cache SonarQube scanner
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Run SonarQube analysis
      - name: Build and Analyze with SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=houssamb6_CI-CD-pipline
        working-directory: data

  # Build job
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: sonar
    steps:
      # Checkout repository
      - uses: actions/checkout@v4

      # Set up Java 22
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      # Build the JAR
      - name: Build JAR
        run: mvn -B package -DskipTests
        working-directory: data

      # Upload the JAR artifact
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: data-artifact
          path: data/target/*.jar